name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out @ashlr/core-efficiency (sibling dep)
        uses: actions/checkout@v4
        with:
          repository: masonwyatt23/ashlr-core-efficiency
          path: ../ashlr-core-efficiency
          # CI-only — public repo, no token needed

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

  smoke:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: masonwyatt23/ashlr-core-efficiency
          path: ../ashlr-core-efficiency
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: MCP server initialize + tools/list
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | bun run servers/efficiency-server.ts \
            | tee /tmp/mcp.out
          grep -q '"name":"ashlr__read"' /tmp/mcp.out
          grep -q '"name":"ashlr__grep"' /tmp/mcp.out
          grep -q '"name":"ashlr__edit"' /tmp/mcp.out
          grep -q '"name":"ashlr__savings"' /tmp/mcp.out

      - name: Bench smoke
        run: bun run servers/bench.ts --dir ../ashlr-core-efficiency/src --json > /tmp/bench.json
        continue-on-error: true

  pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
