<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#8B2E1A"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: ledger square -->
  <rect x="0" y="8" width="32" height="32" rx="6" fill="#1a0f0c"/>
  <rect x="0.75" y="8.75" width="30.5" height="30.5" rx="5.5" fill="none" stroke="url(#logo-grad)" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Ledger lines -->
  <line x1="6" y1="18" x2="26" y2="18" stroke="url(#logo-grad)" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="6" y1="24" x2="26" y2="24" stroke="url(#logo-grad)" stroke-opacity="0.55" stroke-width="1"/>
  <line x1="6" y1="30" x2="26" y2="30" stroke="url(#logo-grad)" stroke-opacity="0.7" stroke-width="1"/>
  <!-- Brand square -->
  <rect x="6" y="10" width="7" height="7" fill="url(#logo-grad)"/>
  <!-- Row dots -->
  <circle cx="23" cy="24" r="2" fill="url(#logo-grad)"/>
  <circle cx="23" cy="30" r="2" fill="url(#logo-grad)" opacity="0.65"/>

  <!-- Wordmark -->
  <!-- Uses a system-font fallback; replace with Fraunces webfont embedding for print use -->
  <text
    x="44"
    y="33"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="28"
    letter-spacing="-0.5"
    fill="#F3EADB"
  >ashlr</text>
</svg>
