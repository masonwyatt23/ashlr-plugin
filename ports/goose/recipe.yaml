# Goose recipe: ashlr MCP suite
# Replace <ASHLR_PLUGIN_ROOT> with the absolute path to your ashlr-plugin clone.
# Example: /home/you/ashlr-plugin
#
# Usage:
#   goose run --recipe ports/goose/recipe.yaml
#
# All 14 ashlr MCP servers are registered as stdio extensions.

version: "1.0"
title: ashlr token-efficiency suite
description: >
  Registers all ashlr MCP servers as Goose extensions.
  Provides token-efficient Read/Grep/Edit/MultiEdit, SQL, Bash,
  Tree, HTTP, Diff, Logs, Genome, Orient, GitHub, Glob, WebFetch,
  and Ask tools.

extensions:
  - name: ashlr-efficiency
    type: stdio
    cmd: bash
    args:
      - "<ASHLR_PLUGIN_ROOT>/scripts/mcp-entrypoint.sh"
      - "servers/efficiency-server.ts"

  - name: ashlr-sql
    type: stdio
    cmd: bash
    args:
      - "<ASHLR_PLUGIN_ROOT>/scripts/mcp-entrypoint.sh"
      - "servers/sql-server.ts"

  - name: ashlr-bash
    type: stdio
    cmd: bash
    args:
      - "<ASHLR_PLUGIN_ROOT>/scripts/mcp-entrypoint.sh"
      - "servers/bash-server.ts"

  - name: ashlr-tree
    type: stdio
    cmd: bash
    args:
      - "<ASHLR_PLUGIN_ROOT>/scripts/mcp-entrypoint.sh"
      - "servers/tree-server.ts"

  - name: ashlr-http
    type: stdio
    cmd: bash
    args:
      - "<ASHLR_PLUGIN_ROOT>/scripts/mcp-entrypoint.sh"
      - "servers/http-server.ts"

  - name: ashlr-diff
    type: stdio
